name: keep-alive

# Mantiene despierto el backend en Render (free tier se duerme tras ~15 min de
# inactividad). Pingea /health cada 10 min, 24/7, con reintentos que toleran un
# eventual arranque en frio.

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos (GitHub puede atrasarlo unos minutos)
  workflow_dispatch:          # permite dispararlo a mano desde la pestania Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (con reintentos para el cold start)
        run: |
          curl -fsS \
            --retry 5 --retry-all-errors --retry-delay 15 \
            --max-time 90 \
            https://portfolio-backend-sp68.onrender.com/health
