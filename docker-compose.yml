version: '3.8'
# BASE = "como producción": cada servicio corre su imagen COMPILADA (Dockerfile
# multi-stage), sin volúmenes ni dotnet watch. Para hot-reload en desarrollo ver
# docker-compose.override.yml (se mergea solo con `docker compose up`).
services:

  # -----------------------------
  # SQL SERVER
  # -----------------------------
  users-db:
    container_name: investment-tracker-sql-db
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "WalletPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - investment-network
    # Healthcheck: el server está "healthy" recién cuando acepta consultas. Los
    # servicios con BD esperan esto (depends_on: service_healthy) para no migrar
    # contra un SQL todavía recuperando bases (race del error 1801 en cold start).
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # -----------------------------
  # RABBITMQ
  # -----------------------------
  rabbitmq:
    container_name: rabbitmq-invest-tracker
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - investment-network

  # -----------------------------
  # USERS SERVICE
  # -----------------------------
  users-service:
    container_name: users-service
    build:
      context: .
      dockerfile: src/Services/Users/Users.API/Dockerfile
    # puerto NO publicado al host: accesible solo vía api-gateway por la red interna
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Server=users-db;Database=UsersDb;User Id=sa;Password=WalletPassword123!;TrustServerCertificate=True;
      EventBusSettings__HostAddress: rabbitmq://rabbitmq
      Jwt__Key: "docker-dev-secret-please-rotate-in-prod-0123456789abcdef"
      Jwt__Issuer: "InvestmentTracker.Users"
      Jwt__Audience: "InvestmentTracker.Clients"
      Jwt__ExpiryMinutes: "60"
    depends_on:
      rabbitmq:
        condition: service_started
      users-db:
        condition: service_healthy
    networks:
      - investment-network

  # -----------------------------
  # HOLDINGS SERVICE
  # -----------------------------
  holdings-service:
    container_name: holdings-service
    build:
      context: .
      dockerfile: src/Services/Holdings/Holdings.API/Dockerfile
    # puerto NO publicado al host: accesible solo vía api-gateway por la red interna
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Server=users-db;Database=HoldingsDb;User Id=sa;Password=WalletPassword123!;TrustServerCertificate=True;
      EventBusSettings__HostAddress: rabbitmq://rabbitmq
      Services__MarketData: http://marketdata-service:8080
      Jwt__Key: "docker-dev-secret-please-rotate-in-prod-0123456789abcdef"
      Jwt__Issuer: "InvestmentTracker.Users"
      Jwt__Audience: "InvestmentTracker.Clients"
      Jwt__ExpiryMinutes: "60"
    depends_on:
      rabbitmq:
        condition: service_started
      users-db:
        condition: service_healthy
      marketdata-service:
        condition: service_started
    networks:
      - investment-network

  # -----------------------------
  # TRANSACTIONS SERVICE
  # -----------------------------
  transactions-service:
    container_name: transactions-service
    build:
      context: .
      dockerfile: src/Services/Transactions/Transactions.API/Dockerfile
    # puerto NO publicado al host: accesible solo vía api-gateway por la red interna
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__TransactionConnectionString: Server=users-db;Database=TransactionDb;User Id=sa;Password=WalletPassword123!;TrustServerCertificate=True;
      EventBusSettings__HostAddress: rabbitmq://rabbitmq
      Jwt__Key: "docker-dev-secret-please-rotate-in-prod-0123456789abcdef"
      Jwt__Issuer: "InvestmentTracker.Users"
      Jwt__Audience: "InvestmentTracker.Clients"
      Jwt__ExpiryMinutes: "60"
    depends_on:
      rabbitmq:
        condition: service_started
      users-db:
        condition: service_healthy
    networks:
      - investment-network

  # -----------------------------
  # MARKET DATA SERVICE
  # -----------------------------
  marketdata-service:
    container_name: marketdata-service
    build:
      context: .
      dockerfile: src/Services/MarketData/MarketData.API/Dockerfile
    # puerto NO publicado al host: accesible solo vía api-gateway por la red interna
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      EventBusSettings__HostAddress: rabbitmq://rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - investment-network

  # -----------------------------
  # API GATEWAY (YARP)
  # -----------------------------
  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: src/ApiGateways/ApiGateway/Dockerfile
    ports:
      - "8000:8080"            # única puerta pública: host 8000 → gateway 8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      # MISMO secreto/issuer/audience que users-service: el gateway rechaza temprano
      # tokens inválidos en las rutas protegidas (Opción B: los servicios igual validan).
      Jwt__Key: "docker-dev-secret-please-rotate-in-prod-0123456789abcdef"
      Jwt__Issuer: "InvestmentTracker.Users"
      Jwt__Audience: "InvestmentTracker.Clients"
      Jwt__ExpiryMinutes: "60"
    depends_on:
      - users-service
      - holdings-service
      - transactions-service
      - marketdata-service
    networks:
      - investment-network

# -----------------------------
# NETWORK
# -----------------------------
networks:
  investment-network:
    driver: bridge

# -----------------------------
# VOLUME
# -----------------------------
volumes:
  sql-data:
